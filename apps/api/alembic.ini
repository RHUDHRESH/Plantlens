# Alembic config (Chunk 1). Minimal — the real DB URL comes from app.settings at runtime via
# migrations/env.py (do NOT hardcode credentials here). Run: `alembic revision --autogenerate -m "..."`
# then `alembic upgrade head`.
[alembic]
script_location = migrations
prepend_sys_path = .
# sqlalchemy.url is set programmatically in migrations/env.py from PLANTLENS DATABASE_URL.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
